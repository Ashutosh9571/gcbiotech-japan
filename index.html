<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GC Biotech Japan</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* Header */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #0b3d91;
  color: white;
  padding: 15px 20px;
}

nav a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
}

/* Hero */
.hero {
  text-align: center;
  padding: 100px 20px;
  background: linear-gradient(to right, #0b3d91, #1e90ff);
  color: white;
}

/* Sections */
.section {
  padding: 50px 20px;
  text-align: center;
}

.services {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  width: 250px;
  margin: 10px;
  padding: 20px;
  background: #f4f4f4;
  border-radius: 10px;
}

/* Footer */
footer {
  background: #0b3d91;
  color: white;
  text-align: center;
  padding: 15px;
}

/* Responsive */
@media (max-width: 768px) {
  header {
    flex-direction: column;
  }
}
</style>

</head>

<body>

<header>
  <h1>GC Biotech Japan</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Services</a>
    <a href="#">Careers</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <h2>Advancing Biotechnology & Diagnostics</h2>
  <p>Innovative solutions in genomics, diagnostics and research</p>
</section>

<section class="section">
  <h2>Our Services</h2>
  <div class="services">
    <div class="card">Drug Testing</div>
    <div class="card">NGS Analysis</div>
    <div class="card">Molecular Biology</div>
    <div class="card">DNA Sequencing</div>
    <div class="card">Protein Purification</div>
  </div>
</section>

<footer>
  <p>© 2026 GC Biotech Japan</p>
</footer>

</body>
</html>
